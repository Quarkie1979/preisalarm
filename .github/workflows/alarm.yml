name: Krypto Preisalarm Cronjob

on:
  schedule:
    # Versucht alle 5 Minuten zu starten (kann bei GitHub Actions variieren)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Ermöglicht es dir, das Skript jederzeit manuell in GitHub zu starten

permissions:
  contents: write # Wichtig: Gibt GitHub die Erlaubnis, die alarm_state.txt im Repository zu speichern

jobs:
  run-price-alert:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Skript ausführen
      env:
        PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        BLOCKFROST_PROJECT_ID: ${{ secrets.BLOCKFROST_PROJECT_ID }}
      run: python preisalarm.py

    - name: Speicher Zustand fuer das naechste Mal
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Prüft sauber, ob die Datei da ist, bevor git add/rm aufgerufen wird
        if [ -f alarm_state.txt ]; then
          git add alarm_state.txt
        else
          git rm alarm_state.txt --ignore-unmatch 2>/dev/null || true
        fi
        
        # Commit nur abfeuern, wenn es wirklich Änderungen im Zustand gibt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update alarm state [skip ci]" && git push)
